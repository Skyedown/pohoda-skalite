version: '3.8'

services:
  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: pizza-pohoda-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-pizzapohoda}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASS:-pizzapohoda_secret}
    ports:
      - '5672:5672'
      - '15672:15672'
    volumes:
      - rabbitmq-data:/var/lib/rabbitmq
    networks:
      - pizza-network
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 30s
      timeout: 10s
      retries: 5

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    image: pohoda-api:latest
    container_name: pizza-pohoda-api
    restart: unless-stopped
    ports:
      - '3001:3001'
    env_file:
      - ./api/.env
    environment:
      - RABBITMQ_URL=amqp://${RABBITMQ_USER:-pizzapohoda}:${RABBITMQ_PASS:-pizzapohoda_secret}@rabbitmq:5672
    volumes:
      # Persist admin settings between container restarts
      - api-data:/app/dist/data
    depends_on:
      rabbitmq:
        condition: service_healthy
    networks:
      - pizza-network
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3001/health',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    image: pohoda-frontend:latest
    container_name: pizza-pohoda-frontend
    restart: unless-stopped
    ports:
      - '8080:80'
    depends_on:
      - api
    networks:
      - pizza-network
    deploy:
      replicas: 1
      update_config:
        order: start-first
        failure_action: rollback
      restart_policy:
        condition: on-failure

networks:
  pizza-network:
    driver: bridge

volumes:
  api-data:
    driver: local
  rabbitmq-data:
    driver: local
